services:
  - type: web
    name: deneme-takip-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && npm run seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
